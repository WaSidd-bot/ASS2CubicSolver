<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" type="text/css" href="/src/style.css">
  <title>cubicsolver</title>
</head>

<body>
  <div id="app"></div>
  
  <h1>Cubic Solver</h1>
  <form class="ui-elements" id="form">
    <label>a-value:</label>
    <label>b-value:</label>
    <label>c-value:</label>
    <label>d-value:</label>
    <input type="number" class="inputs" id="a" name="a">
    <input type="number" class="inputs" id="b" name="b">
    <input type="number" class="inputs" id="c" name="c">
    <input type="number" class="inputs" id="d" name="d">
    <input type="submit" class="button" value="calculate" name="submit" onclick="plotCubicEquation()">
    <input type="text" id="result" name="result">
  </form>

  <canvas id="graph" width="600" height="400"></canvas>

  <table>
    <tr>
      <td>p value</td>
      <td id="pDisplay">0</td>
    </tr>
    <tr>
      <td>q value</td>
      <td id="qDisplay">0</td>
    </tr>
    <tr>
      <td>discriminant</td>
      <td id="discriminant">0</td>
    </tr>
    <tr>
      <th>Values</th>
      <th>X</th>
      <th>Y</th>
    </tr>
    <tr>
      <td>FirstRoot</td>
      <td id="rootXOne"></td>
      <td>0</td>
    </tr>
    <tr>
      <td>SecondRoot</td>
      <td id="rootXTwo"></td>
      <td>0</td>
    </tr>
    <tr>
      <td>ThirdRoot</td>
      <td id="rootXThree"></td>
      <td>0</td>
    </tr>

  </table>

  <script src="/src/cubicSolver.ts" type="module"></script>
  <script src="/src/canvas.js"></script>
</body>

</html>
